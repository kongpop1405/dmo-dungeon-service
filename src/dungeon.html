<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMO Dungeon Service — Per-Dungeon Poster</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Share+Tech+Mono&family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --deep:#020912; --base:#04101F; --panel:rgba(8,20,40,.78);
    --blue:#00B4FF; --gold:#FFD700; --silver:#E6F2FF;
    --txt:#DCEEFF; --mut:#6E8FB8; --grid:rgba(0,180,255,.05); --grn:#3FDD7A;
  }
  body{
    background:#020912; color:var(--txt); font-family:'Kanit',sans-serif;
    display:flex; justify-content:center; padding:24px 12px;
  }
  /* square 1080 (FB feed) — 1 ดัน/รูป */
  .poster{
    --tone:#00B4FF; --tdim:rgba(0,180,255,.5); --tsoft:rgba(0,180,255,.10); --tacc:#4FD0FF;
    position:relative; width:1080px; height:1080px; max-width:100%;
    background:
      radial-gradient(ellipse 90% 50% at 50% 0%,#0c2344 0%,#081a33 45%,#06122a 100%);
    border:1px solid rgba(0,180,255,.25); overflow:hidden;
    padding:34px 36px 30px; display:flex; flex-direction:column;
  }
  .poster[data-t="kaiser"]        {--tone:#00B4FF;--tdim:rgba(0,180,255,.5);--tsoft:rgba(0,180,255,.12);--tacc:#4FD0FF}
  .poster[data-t="darkweb"]       {--tone:#B26BFF;--tdim:rgba(178,107,255,.5);--tsoft:rgba(178,107,255,.14);--tacc:#C99CFF}
  .poster[data-t="kaiser-dungeon"]{--tone:#00B4FF;--tdim:rgba(0,180,255,.5);--tsoft:rgba(0,180,255,.12);--tacc:#4FD0FF}
  .poster[data-t="destruction"]   {--tone:#FF9D2E;--tdim:rgba(255,157,46,.5);--tsoft:rgba(255,157,46,.14);--tacc:#FFB85C}
  .poster[data-t="royalbase"]     {--tone:#FF4D6A;--tdim:rgba(255,77,106,.5);--tsoft:rgba(255,77,106,.14);--tacc:#FF7D93}
  .poster[data-t="market"]        {--tone:#FF5FC8;--tdim:rgba(255,95,200,.5);--tsoft:rgba(255,95,200,.14);--tacc:#FF94DB}

  .poster::before{
    content:''; position:absolute; inset:0;
    background-image:
      linear-gradient(0deg,var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:46px 46px; pointer-events:none; z-index:0;
  }
  /* tone glow on whole poster */
  .poster::after{
    content:''; position:absolute; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(ellipse 70% 60% at 78% 42%,var(--tsoft),transparent 62%);
  }
  .poster > *{position:relative; z-index:1}

  .frame-c{position:absolute; width:34px; height:34px; border:2px solid var(--tone); z-index:5; pointer-events:none; opacity:.7}
  .frame-c.tl{top:12px;left:12px;border-right:none;border-bottom:none}
  .frame-c.tr{top:12px;right:12px;border-left:none;border-bottom:none}
  .frame-c.bl{bottom:12px;left:12px;border-right:none;border-top:none}
  .frame-c.br{bottom:12px;right:12px;border-left:none;border-top:none}

  /* ═══ HEADER ═══ */
  .ph{display:flex; justify-content:space-between; align-items:flex-start;
      border-bottom:1px solid rgba(0,180,255,.22); padding-bottom:16px;}
  .ph-l .eyebrow{font-family:'Orbitron',sans-serif; font-size:13px; font-weight:600; letter-spacing:.34em; color:var(--mut)}
  .ph-l .eyebrow::before{content:'— '} .ph-l .eyebrow::after{content:' —'}
  .ph-l .t1{font-family:'Orbitron',sans-serif; font-size:46px; font-weight:900; letter-spacing:.04em; line-height:1;
    background:linear-gradient(180deg,#FFE680 0%,#FFD700 50%,#C99700 100%); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.5)); margin-top:4px}
  .ph-l .tag{font-size:13px; color:var(--mut); letter-spacing:.05em; margin-top:5px}
  .ph-l .tag b{color:var(--blue)}
  .ph-r{text-align:right; display:flex; flex-direction:column; gap:6px; padding-top:4px}
  .ph-r .ln{font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:.2em}
  .ph-r .ln .lab{color:var(--mut)} .ph-r .ln .val{color:var(--tacc)}
  .ph-r .st .val{color:var(--grn); text-shadow:0 0 10px rgba(63,221,122,.5)}
  .ph-r .st .val::before{content:'• '}

  /* ═══ MAIN ═══ */
  .main{flex:1; display:grid; grid-template-columns:1fr 1fr; gap:18px; padding:22px 0 18px; min-height:0}
  .col-l{display:flex; flex-direction:column; gap:14px; position:relative; z-index:2}
  .col-r{position:relative}

  .kicker{font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700; letter-spacing:.28em; color:var(--tacc)}
  .kicker::before{content:'• '}
  .dg-title{font-family:'Orbitron',sans-serif; font-size:44px; font-weight:900; line-height:.96; letter-spacing:.01em;
    color:var(--tacc); text-transform:uppercase; text-shadow:0 2px 4px rgba(0,0,0,.6), 0 0 10px var(--tdim); margin-top:4px}
  .dg-titleth{font-size:16px; color:var(--txt); margin-top:6px}

  .boss-box{border:1px solid var(--tdim); background:rgba(0,0,0,.28); padding:14px 18px; margin-top:4px}
  .boss-box .kicker{font-size:12px; letter-spacing:.24em; color:var(--gold)}
  .boss-box .bn{font-family:'Orbitron',sans-serif; font-size:30px; font-weight:800; color:var(--txt); line-height:1; margin-top:6px; text-shadow:0 0 8px var(--tdim)}
  .boss-box .bnth{font-size:14px; color:var(--mut); margin-top:4px}

  .meta{display:flex; flex-direction:column; gap:9px; font-size:14px}
  .meta .row{display:flex; gap:9px; align-items:baseline}
  .meta .row .k{color:var(--mut); white-space:nowrap; min-width:78px}
  .meta .row .v{color:var(--txt); font-weight:500}
  .drop-card{border:1px solid var(--tdim); background:linear-gradient(120deg,var(--tsoft),rgba(0,0,0,.25)); padding:12px 16px; margin-top:auto}
  .drop-card .k{font-size:12px; letter-spacing:.16em; color:var(--gold); display:flex; align-items:center; gap:7px}
  .drop-card .k .ic{font-size:15px}
  .drop-card .v{font-size:17px; font-weight:600; color:var(--txt); margin-top:5px; line-height:1.25}

  /* boss image */
  .boss-stage{position:absolute; inset:-10px -20px -10px 0;}
  .boss-stage .halo{position:absolute; inset:6% 0 6% 4%; border-radius:50%;
    background:radial-gradient(circle,var(--tsoft) 0%,transparent 66%); filter:blur(12px); opacity:.85}
  .boss-stage .img{position:absolute; inset:0;
    background-repeat:no-repeat; background-position:center; background-size:contain;
    filter:drop-shadow(0 8px 20px rgba(0,0,0,.7)) drop-shadow(0 0 12px var(--tone)) brightness(1.06) contrast(1.08) saturate(1.12)}

  /* ═══ PACKAGES ═══ */
  .pkg{border:1px solid var(--tdim); background:var(--panel); padding:18px 22px 20px; position:relative; z-index:3}
  .pkg::before{content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--tone); box-shadow:0 0 14px var(--tone)}
  .pkg h3{font-family:'Orbitron',sans-serif; font-size:16px; font-weight:700; letter-spacing:.24em; color:var(--tacc); text-align:center; margin-bottom:16px}
  .pkg h3::before{content:'// '} .pkg h3::after{content:' //'}
  .pkg-list{display:flex; flex-direction:column; gap:0}
  .pkg-row{display:grid; grid-template-columns:1fr auto; align-items:center; gap:16px;
    padding:13px 14px; border-top:1px solid rgba(255,255,255,.07)}
  .pkg-row:first-child{border-top:none}
  .pkg-row.feat{background:linear-gradient(90deg,var(--tsoft),transparent); border:1px solid var(--tdim); border-radius:4px; margin:4px 0}
  .pkg-row .pn{font-family:'Orbitron',sans-serif; font-size:17px; font-weight:700; color:var(--txt); text-transform:uppercase; letter-spacing:.02em}
  .pkg-row.feat .pn{color:var(--tacc)}
  .pkg-row .pp{font-family:'Orbitron',sans-serif; font-size:30px; font-weight:900; color:var(--tacc); line-height:.9; text-align:right; white-space:nowrap}
  .pkg-row .pp .u{font-family:'Kanit'; font-size:13px; font-weight:400; color:var(--mut); margin-left:5px}

  /* ═══ FOOTER ═══ */
  .pf{text-align:center; font-size:13px; color:var(--mut); line-height:1.6; padding-top:14px; border-top:1px solid rgba(0,180,255,.18)}
  .pf b{color:var(--gold)} .pf .grn{color:var(--grn)}
</style>
</head>
<body>
  <div class="poster" id="poster">
    <span class="frame-c tl"></span><span class="frame-c tr"></span>
    <span class="frame-c bl"></span><span class="frame-c br"></span>

    <div class="ph">
      <div class="ph-l">
        <div class="eyebrow">Digimon Masters Online</div>
        <div class="t1">DUNGEON SERVICE</div>
        <div class="tag" id="tag"></div>
      </div>
      <div class="ph-r">
        <div class="ln st"><span class="lab">STATUS&nbsp;</span><span class="val" id="status"></span></div>
        <div class="ln"><span class="lab">NODE&nbsp;</span><span class="val" id="node"></span></div>
      </div>
    </div>

    <div class="main">
      <div class="col-l">
        <div>
          <div class="kicker">DUNGEON</div>
          <div class="dg-title" id="dgTitle"></div>
          <div class="dg-titleth" id="dgTitleTh"></div>
        </div>
        <div class="boss-box">
          <div class="kicker">TARGET BOSS</div>
          <div class="bn" id="bossEn"></div>
          <div class="bnth" id="bossTh"></div>
        </div>
        <div class="meta" id="meta"></div>
        <div class="drop-card" id="dropCard"></div>
      </div>
      <div class="col-r">
        <div class="boss-stage">
          <div class="halo"></div>
          <div class="img" id="bossImg"></div>
        </div>
      </div>
    </div>

    <div class="pkg">
      <h3>SERVICE PACKAGES</h3>
      <div class="pkg-list" id="pkgList"></div>
    </div>

    <div class="pf" id="footer"></div>
  </div>

<script>
const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const id = new URLSearchParams(location.search).get('id');

fetch('data/poster.json').then(r=>r.json()).then(d=>{
  const b = d.brand;
  const dg = d.dungeons.find(x => x.id === id) || d.dungeons[0];
  const node = String(d.dungeons.findIndex(x=>x.id===dg.id)+1).padStart(2,'0') + ' / ' + String(d.dungeons.length).padStart(2,'0');

  document.getElementById('poster').dataset.t = dg.theme;
  document.getElementById('tag').innerHTML = b.subhead || (b.tagline + ' · ' + b.contactNote);
  document.getElementById('status').textContent = b.status;
  document.getElementById('node').textContent = node;

  document.getElementById('dgTitle').textContent = dg.title;
  document.getElementById('dgTitleTh').textContent = dg.titleTh;
  document.getElementById('bossEn').textContent = dg.boss;
  document.getElementById('bossTh').textContent = dg.bossTh;
  document.getElementById('bossImg').style.backgroundImage = `url('${dg.image}')`;

  // meta rows — render เท่าที่มีใน JSON (ข้าม '—')
  const rows = [];
  if (dg.mat && dg.mat !== '—') rows.push(['วัตถุดิบ', dg.mat]);
  document.getElementById('meta').innerHTML = rows.map(([k,v]) =>
    `<div class="row"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join('');

  // drop card (ถ้าไม่มี drop -> ซ่อน)
  const drop = document.getElementById('dropCard');
  if (dg.drop && dg.drop !== '—') {
    drop.innerHTML = `<div class="k"><span class="ic">🎁</span>ของดรอป / รางวัล</div><div class="v">${esc(dg.drop)}</div>`;
  } else { drop.style.display = 'none'; }

  // packages
  document.getElementById('pkgList').innerHTML = dg.packages.map(p =>
    `<div class="pkg-row${p.featured?' feat':''}">
       <span class="pn">${esc(p.name)}</span>
       <span class="pp">${p.price.toLocaleString()}<span class="u">บาท</span></span>
     </div>`).join('');

  // footer
  const pay = (b.pay||[]).join(' · ');
  document.getElementById('footer').innerHTML =
    `ติดต่อ <b>${esc(b.contact?.fb||'')}</b> · ${(b.hours||[]).join(' ')} · ชำระผ่าน ${esc(pay)}<br>` +
    `<span class="grn">${esc(b.contactNote||'')}</span>`;
});
</script>
</body>
</html>
